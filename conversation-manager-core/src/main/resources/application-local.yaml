spring:
    config:
        import:
            - optional:file:.env.local[.properties]
            - optional:file:../.env.local[.properties]
    datasource:
        url: ${CONVERSATION_MANAGER_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/conversation_manager}
        username: ${CONVERSATION_MANAGER_DATASOURCE_USERNAME:postgres}
        password: ${CONVERSATION_MANAGER_DATASOURCE_PASSWORD:postgres}
        driver-class-name: org.postgresql.Driver
        hikari:
            connection-init-sql: SET TIME ZONE 'UTC'

agent-breaker:
    oss:
        access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:}
        access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}
        region: ${ALIYUN_OSS_REGION:cn-hangzhou}
        endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
        bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
        bucket-host: ${ALIYUN_OSS_BUCKET_HOST:}
        private-bucket: ${ALIYUN_OSS_BUCKET_PRIVATE:true}
        presigned-url-ttl-seconds: ${ALIYUN_OSS_PRESIGNED_URL_TTL_SECONDS:300}
        object-prefix: ${ALIYUN_OSS_OBJECT_PREFIX:dev/user-files}
    files:
        max-bytes: ${AGENT_BREAKER_FILE_MAX_BYTES:10485760}
        max-count-per-message: ${AGENT_BREAKER_FILE_MAX_COUNT_PER_MESSAGE:5}
        max-total-bytes-per-message: ${AGENT_BREAKER_FILE_MAX_TOTAL_BYTES_PER_MESSAGE:52428800}
        orphan-ttl-seconds: ${AGENT_BREAKER_FILE_ORPHAN_TTL_SECONDS:86400}
        max-extracted-characters: ${AGENT_BREAKER_FILE_MAX_EXTRACTED_CHARACTERS:300000}
        task-concurrency: ${AGENT_BREAKER_FILE_TASK_CONCURRENCY:8}
        task-lease-seconds: ${AGENT_BREAKER_FILE_TASK_LEASE_SECONDS:300}
        reservation-seconds: ${AGENT_BREAKER_FILE_RESERVATION_SECONDS:14400}
        allowed-extensions: ${AGENT_BREAKER_FILE_ALLOWED_EXTENSIONS:docx,pdf,xlsx,pptx,txt,md,log,png,jpg,jpeg,webp,csv,json}
        allowed-mime-types: ${AGENT_BREAKER_FILE_ALLOWED_MIME_TYPES:application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain,text/markdown,text/csv,application/json,image/png,image/jpeg,image/webp}
